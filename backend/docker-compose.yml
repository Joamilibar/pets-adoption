services:
  api:
    build: .
    container_name: pet-adoption-api
    ports:
      - "3000:3000"
    environment:
      - MONGO_URL=mongodb://mongo:27017/petadoption
      - JWT_SECRET=${JWT_SECRET:-miSuperSecreto2025}
      - PORT=3000
      - NODE_ENV=production
    depends_on:
      - mongo
    restart: unless-stopped
    volumes:
      - ./uploads:/app/uploads

  mongo:
    image: mongo:7
    container_name: pet-adoption-mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=petadoption

volumes:
  mongo-data:
    driver: local
